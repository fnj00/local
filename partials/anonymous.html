<md-content>
  <md-toolbar class="toolbar-top" theme="forest" md-colors="{color: 'red-A100'}">
    <div class="md-toolbar-tools">
      <div style="padding: 0 4px 0 0;">
        <a href="#/anonymous/{{eventId}}">
          <img src="img/logo-xs.png" alt="Logo">
        </a>
      </div>

      <span class="title">{{eventTitle || 'Anonymous Song Request'}}</span>
      <span flex></span>
    </div>
  </md-toolbar>
</md-content>

<div layout="column" layout-padding style="max-width: 820px; margin: 0 auto;">
  <md-card>
    <md-card-content>
      <h2 style="margin-top: 0;">Anonymous Song Request</h2>
      <p class="md-body-1">
        Send a song request without adding your name.
      </p>

      <form ng-submit="submitSong()" novalidate>
        <md-input-container class="md-block">
          <label>Song title and/or artist</label>
          <input ng-model="formData.song" maxlength="200" autocomplete="off">
        </md-input-container>

        <md-input-container class="md-block">
          <label>Your name (optional)</label>
          <input ng-model="formData.requesterName" maxlength="100" autocomplete="name">
        </md-input-container>

        <div ng-if="submitError" style="margin: 12px 0; color: #b00020;">
          {{submitError}}
        </div>

        <div ng-if="submitSuccess" style="margin: 12px 0; color: #2e7d32;">
          {{responseMessage}}
        </div>

        <div layout="row" layout-wrap layout-gap="12">
          <md-button class="md-raised md-primary" type="submit" ng-disabled="isSubmitting">
            {{isSubmitting ? 'Sending…' : 'Send Request'}}
          </md-button>

          <md-button class="md-raised" href="#/event/{{eventId}}">
            Back to Event
          </md-button>
        </div>
      </form>
    </md-card-content>
  </md-card>
</div>
